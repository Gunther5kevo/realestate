name: Haven
description: A professional real estate application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  firebase_messaging: ^16.2.0
  cloud_functions: ^6.2.0

  # Navigation
  go_router: ^17.2.3

  # State Management
  flutter_riverpod: ^3.1.0
  riverpod_annotation: ^4.0.0

  # UI Components
  flutter_animate: ^4.3.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  smooth_page_indicator: ^2.0.1
  photo_view: ^0.15.0
  video_player: ^2.8.1
  chewie: ^1.7.4

  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^14.0.2
  geocoding: ^4.0.0

  # Payments
  flutter_stripe: ^12.6.0

  # Utilities
  dio: ^5.4.0
  image_picker: ^1.0.7
  file_picker: ^11.0.2
  intl: ^0.20.2
  url_launcher: ^6.2.4
  share_plus: ^12.0.2
  connectivity_plus: ^7.1.1
  flutter_local_notifications: ^20.1.0
  permission_handler: ^12.0.1

  # Forms & Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0

  # Icons & Fonts
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^4.0.0+1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
  - family: Sora
    fonts:
      - asset: assets/fonts/Sora-Regular.ttf
      - asset: assets/fonts/Sora-Medium.ttf
        weight: 500
      - asset: assets/fonts/Sora-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Sora-Bold.ttf
        weight: 700
  - family: Plus Jakarta Sans
    fonts:
      - asset: assets/fonts/PlusJakartaSans-Regular.ttf
      - asset: assets/fonts/PlusJakartaSans-Medium.ttf
        weight: 500
      - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/PlusJakartaSans-Bold.ttf
        weight: 700